<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
	
		<title>Job Tracker</title>
		<style>
			body {
			    background: linear-gradient(135deg, #667eea, #764ba2);
			    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			}
			
			.form-container-fluid {
			    width: 420px;
			    margin: 60px auto;
			    padding: 30px;
			    border-radius: 15px;
			    background: rgba(255, 255, 255, 0.95);
			    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
			    backdrop-filter: blur(10px);
			    transition: transform 0.3s ease;
			}
			
			.form-container-fluid:hover {
			    transform: scale(1.02);
			}
			
			h1, h2 {
			    text-align: center;
			    color: #333;
			    margin-bottom: 20px;
			}
			
			label {
			    font-weight: 600;
			    color: #555;
			}
			
			input, select {
			    width: 100%;
			    padding: 10px;
			    margin-top: 6px;
			    margin-bottom: 15px;
			    border-radius: 8px;
			    border: 1px solid #ccc;
			    outline: none;
			    transition: all 0.3s ease;
			}
			
			input:focus, select:focus {
			    border-color: #667eea;
			    box-shadow: 0 0 8px rgba(102, 126, 234, 0.5);
			}
			
			button {
			    margin-top: 10px;
			    padding: 12px;
			    width: 100%;
			    background: linear-gradient(135deg, #667eea, #764ba2);
			    color: white;
			    border: none;
			    border-radius: 8px;
			    font-size: 16px;
			    font-weight: bold;
			    cursor: pointer;
			    transition: all 0.3s ease;
			}
			
			button:hover {
			    background: linear-gradient(135deg, #5a67d8, #6b46c1);
			    transform: translateY(-2px);
			    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
			}
			
			button:active {
			    transform: scale(0.98);
			}
			
			::placeholder {
			    color: #aaa;
			    font-style: italic;
			}
		</style>
	
	</head>
	<body>
	
	
		<h1>Welcome to Smart Job Tracker 🚀</h1>
		<form class="form-container-fluid" th:action="@{/index}"
			th:object="${user}" method="post">
	
	
			<h2>Login</h2>
	
			Email: <input type="text" th:field="*{email}" /><br> <br>
			Password: <input type="password" th:field="*{password}" /><br> <br>
	
			<button type="submit">Login</button>
	
			<p style="text-align:center"><a href="/register">New User? Register here</a></p>
	
			<p th:if="${error}" th:text="${error}" style="color: red;text-align:center"></p>
	
		</form>
	</body>
</html>
